<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixForesight | IoT Predictive Maintenance Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* Design Tokens & Theme Variables */
        :root {
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --bg-deep: #070a13;
            --bg-surface: rgba(15, 23, 42, 0.65);
            --border-glass: rgba(255, 255, 255, 0.07);
            
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.15);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.15);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.15);
            --info: #0ea5e9;

            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            background-image: 
              radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
              radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.04) 0%, transparent 40%);
            background-attachment: fixed;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Layout Grid */
        .app-container {
            display: grid;
            grid-template-rows: 70px 1fr;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(10, 15, 30, 0.8);
            border-bottom: 1px solid var(--border-glass);
            z-index: 50;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            font-family: var(--font-heading);
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Search bar */
        .search-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 8px 14px;
            width: 100%;
            max-width: 420px;
            transition: all 0.3s;
        }

        .search-container:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.15);
        }

        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 13px;
            width: 100%;
            margin-left: 8px;
        }

        /* Status indicators */
        .system-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-glass);
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
        }

        /* Dashboard Workspace */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 320px 1fr 340px;
            overflow: hidden;
            height: 100%;
        }

        .sidebar-panel {
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 15, 30, 0.15);
        }

        .center-panel {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 24px;
            gap: 24px;
            background: rgba(10, 15, 30, 0.05);
        }

        .alerts-panel {
            border-left: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(10, 15, 30, 0.15);
        }

        /* Panel Headers */
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 56px;
        }

        .panel-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            font-weight: 700;
        }

        /* Cards */
        .glass-card {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
            transition: all 0.3s;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        /* List Items */
        .machine-list {
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .machine-item {
            padding: 14px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .machine-item:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateX(2px);
        }

        .machine-item.active {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .machine-item-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .machine-name-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 13px;
        }

        .machine-prob-badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
        }

        .machine-prob-badge.healthy { background: var(--success-glow); color: var(--success); }
        .machine-prob-badge.warning { background: var(--warning-glow); color: var(--warning); }
        .machine-prob-badge.danger { background: var(--danger-glow); color: var(--danger); animation: pulse-text 2s infinite; }

        .machine-metrics-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Detail pane details */
        .vitals-grid {
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 24px;
        }

        .gauge-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .risk-gauge-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 10px 0;
        }

        .gauge-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.04);
            stroke-width: 10;
        }

        .gauge-fill {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dasharray 0.5s ease;
        }

        .gauge-fill.healthy { stroke: var(--success); }
        .gauge-fill.warning { stroke: var(--warning); }
        .gauge-fill.danger { stroke: var(--danger); }

        .gauge-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gauge-val {
            font-size: 28px;
            font-weight: 800;
            font-family: var(--font-heading);
        }

        .gauge-lbl {
            font-size: 9px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        /* Charts */
        .chart-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            padding: 4px;
            border-radius: 8px;
        }

        .chart-tab {
            padding: 5px 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .chart-tab.active {
            background: var(--primary);
            color: #fff;
        }

        .chart-body {
            height: 150px;
            position: relative;
        }

        /* Recommendations */
        .rec-card {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .rec-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .rec-priority-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .rec-priority-badge.critical { background: var(--danger-glow); color: var(--danger); }
        .rec-priority-badge.high { background: var(--warning-glow); color: var(--warning); }
        .rec-priority-badge.medium { background: var(--info-glow); color: var(--info); }
        .rec-priority-badge.low { background: var(--success-glow); color: var(--success); }

        .rec-action-box {
            padding: 14px;
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-glass);
            border-radius: 10px;
        }

        .parts-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .parts-table th, .parts-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-glass);
        }

        .parts-table th {
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.05em;
        }

        .part-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .part-badge.instock { background: var(--success-glow); color: var(--success); }
        .part-badge.lowstock { background: var(--warning-glow); color: var(--warning); }
        .part-badge.outofstock { background: var(--danger-glow); color: var(--danger); }
        .part-badge.unavailable { background: rgba(255,255,255,0.05); color: var(--text-muted); }

        .btn-action {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .btn-action:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        .btn-action:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Alerts List */
        .alerts-list {
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .alert-card {
            padding: 12px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .alert-card.critical { border-left-color: var(--danger); background: rgba(244, 63, 94, 0.01); }
        .alert-card.warning { border-left-color: var(--warning); background: rgba(245, 158, 11, 0.01); }
        .alert-card.info { border-left-color: var(--info); }

        .alert-subject {
            font-size: 12px;
            font-weight: 600;
        }

        .alert-message {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .alert-time {
            font-size: 9px;
            color: var(--text-muted);
        }

        /* Search Results Overlay */
        .search-results-overlay {
            padding: 16px;
            border-bottom: 1px solid var(--border-glass);
            background: rgba(99, 102, 241, 0.05);
            display: none;
        }

        .search-results-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
            max-height: 220px;
            overflow-y: auto;
        }

        .search-item {
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 11px;
        }

        /* Animations */
        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .glow-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--success);
            box-shadow: 0 0 6px var(--success);
            position: relative;
        }

        .glow-dot::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 1px solid var(--success);
            animation: pulse-dot 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-section">
                <!-- Spindle Icon -->
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" style="filter: drop-shadow(0 0 6px rgba(99,102,241,0.5));">
                    <rect x="4" y="4" width="16" height="16" rx="2" />
                    <rect x="9" y="9" width="6" height="6" rx="1" />
                    <path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3" />
                </svg>
                <span class="logo-text">FixForesight</span>
            </div>

            <!-- Global Search bar -->
            <form id="search-form" class="search-container">
                <!-- Search Icon -->
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.5">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search historical incidents (e.g. bearing, coolant, overheat)...">
                <button type="button" id="clear-search-btn" style="background:transparent; border:none; color:var(--text-muted); cursor:pointer; font-size:10px; display:none;">Clear</button>
            </form>

            <!-- Vitals status pills -->
            <div class="system-status">
                <div class="status-badge" id="badge-analytics" style="border-color: rgba(255,255,255,0.12); font-size:11px;">
                    Analytics: <span id="anal-healthy" style="color:var(--success); margin-left:4px;">--% H</span> | <span id="anal-warning" style="color:var(--warning)">--% W</span> | <span id="anal-critical" style="color:var(--danger)">--% C</span>
                </div>
                <div class="status-badge" id="badge-api">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5">
                        <path d="M12 18h.01M8 14a5 5 0 018 0M5 10a9 9 0 0114 0M2 6a13 13 0 0120 0" />
                    </svg>
                    API: <span id="status-api-text" style="color:var(--success)">healthy</span>
                </div>
                <div class="status-badge">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5">
                        <ellipse cx="12" cy="5" rx="9" ry="3" />
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5M3 12c0 1.66 4 3 9 3s9-1.34 9-3" />
                    </svg>
                    DB
                </div>
                <button onclick="window.location.reload()" style="background:transparent; border:none; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; padding: 4px;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Workspace grid -->
        <div class="dashboard-grid">
            
            <!-- Left sidebar: Machine directory -->
            <aside class="sidebar-panel">
                <div class="panel-header">
                    <h2 class="panel-title">Monitored Units</h2>
                    <span class="status-badge" style="padding: 2px 8px; font-size: 9px; gap: 4px;">
                        <span class="glow-dot"></span> Live Vitals
                    </span>
                </div>
                <div class="machine-list" id="machine-list-container">
                    <!-- Loaded dynamically -->
                </div>
            </aside>

            <!-- Central analytics pane -->
            <main class="center-panel">
                <!-- Search overlay results -->
                <div id="search-overlay" class="glass-card search-results-overlay">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 4px;">
                        <h3 style="font-size:13px; color:var(--primary); font-family:var(--font-heading); font-weight:700;">Historical Incident Logs</h3>
                        <button onclick="hideSearch()" style="background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--border-glass); padding:2px 8px; border-radius:4px; font-size:10px; cursor:pointer;">Close</button>
                    </div>
                    <div class="search-results-list" id="search-results-container">
                        <!-- Loaded dynamically -->
                    </div>
                </div>

                <!-- Telemetry section -->
                <div class="vitals-grid">
                    
                    <!-- Gauge -->
                    <div class="glass-card gauge-card">
                        <h3 style="font-size: 11px; align-self: flex-start; color: var(--text-secondary); text-transform: uppercase; font-weight:700;">Failure risk percentage</h3>
                        <div class="risk-gauge-container">
                            <svg class="gauge-svg">
                                <circle cx="70" cy="70" r="60" class="gauge-bg" />
                                <circle cx="70" cy="70" r="60" id="gauge-fill" class="gauge-fill healthy" stroke-dasharray="0 376.8" />
                            </svg>
                            <div class="gauge-text">
                                <span class="gauge-val" id="gauge-val-text">--%</span>
                                <span class="gauge-lbl">Index</span>
                            </div>
                        </div>
                        <div style="margin-top:4px;">
                            <h4 id="gauge-failure-type" style="font-size:14px; font-weight:700; font-family:var(--font-heading)">Normal Operation</h4>
                            <p id="gauge-time-remaining" style="font-size:11px; color:var(--text-secondary); margin-top:2px; display:none;"></p>
                        </div>
                    </div>

                    <!-- Telemetry Sparkline -->
                    <div class="glass-card chart-card">
                        <div class="chart-header">
                            <h3 style="font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight:700;">Sensor Telemetry Sparkline</h3>
                            <div class="chart-tabs">
                                <button class="chart-tab active" onclick="setChartTab('temperature')">Temp</button>
                                <button class="chart-tab" onclick="setChartTab('vibration')">Vibr</button>
                                <button class="chart-tab" onclick="setChartTab('pressure')">Pres</button>
                            </div>
                        </div>
                        <div class="chart-body" id="chart-svg-container">
                            <!-- SVGs loaded dynamically -->
                        </div>
                    </div>

                </div>

                <!-- Recommendation box -->
                <div class="glass-card rec-card" id="recommendations-container">
                    <!-- Loaded dynamically -->
                </div>
            </main>

            <!-- Right panel: Event alerts -->
            <aside class="alerts-panel" style="border-left: 1px solid var(--border-glass); display: flex; flex-direction: column; overflow: hidden; background: rgba(10, 15, 30, 0.15);">
                <div class="panel-header">
                    <h2 class="panel-title">AWS Alert Feed</h2>
                    <span class="status-badge" style="color:var(--primary); font-size:10px; border-color:var(--primary-glow)">SNS</span>
                </div>
                <div class="alerts-list" id="alerts-container">
                    <!-- Loaded dynamically -->
                </div>
            </aside>

        </div>
    </div>

    <!-- Controller Scripts -->
    <script>
        const API_BASE = window.location.origin;
        
        let machines = [];
        let activeId = 'M101';
        let detail = null;
        let rec = null;
        let alerts = [];
        let activeTab = 'temperature';

        // Fetch Health check
        async function fetchHealth() {
            try {
                const r = await fetch(`${API_BASE}/health`);
                if (!r.ok) throw new Error();
                const d = await r.json();
                document.getElementById('status-api-text').textContent = 'healthy';
                document.getElementById('status-api-text').style.color = 'var(--success)';
            } catch(e) {
                document.getElementById('status-api-text').textContent = 'offline';
                document.getElementById('status-api-text').style.color = 'var(--danger)';
            }
        }

        // Fetch Overview metrics
        async function loadMachines() {
            try {
                const r = await fetch(`${API_BASE}/machines`);
                if (r.ok) {
                    machines = await r.json();
                    renderMachineList();
                }
            } catch(e) {
                console.error("Overview fetch failure", e);
            }
        }

        // Fetch Alerts
        async function loadAlerts() {
            try {
                const r = await fetch(`${API_BASE}/alerts`);
                if (r.ok) {
                    alerts = await r.json();
                    renderAlerts();
                }
            } catch(e) {
                console.error("Alerts fetch failure", e);
            }
        }

        // Fetch Analytics
        async function fetchAnalytics() {
            try {
                const r = await fetch(`${API_BASE}/analytics`);
                if (r.ok) {
                    const data = await r.json();
                    document.getElementById('anal-healthy').textContent = `${data.healthy}% H`;
                    document.getElementById('anal-warning').textContent = `${data.warning}% W`;
                    document.getElementById('anal-critical').textContent = `${data.critical}% C`;
                }
            } catch(e) {
                console.error("Analytics fetch failure", e);
            }
        }

        // Fetch risk detail
        async function loadDetails(id) {
            try {
                const r = await fetch(`${API_BASE}/machines/${id}/risk`);
                if (r.ok) {
                    detail = await r.json();
                    renderGauge();
                    renderChart();
                }
            } catch(e) {
                console.error("Detail fetch failure", e);
            }
        }

        // Fetch prescription
        async function loadRecommendations(id) {
            try {
                const r = await fetch(`${API_BASE}/machines/${id}/recommendations`);
                if (r.ok) {
                    rec = await r.json();
                    renderRecommendations();
                }
            } catch(e) {
                console.error("Recommendations fetch failure", e);
            }
        }

        // Action: select machine
        function selectMachine(id) {
            activeId = id;
            document.querySelectorAll('.machine-item').forEach(el => {
                el.classList.remove('active');
            });
            const selectedItem = document.getElementById(`m-item-${id}`);
            if (selectedItem) selectedItem.classList.add('active');
            
            loadDetails(id);
            loadRecommendations(id);
        }

        // Action: switch tabs
        function setChartTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.chart-tab').forEach(el => {
                el.classList.remove('active');
                if (el.textContent.toLowerCase().includes(tab.substring(0,3))) {
                    el.classList.add('active');
                }
            });
            renderChart();
        }

        // Action: submit search
        const searchForm = document.getElementById('search-form');
        const searchInput = document.getElementById('search-input');
        const clearSearchBtn = document.getElementById('clear-search-btn');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const val = searchInput.value.trim();
            if (val) {
                clearSearchBtn.style.display = 'block';
                try {
                    const r = await fetch(`${API_BASE}/incidents/search?q=${encodeURIComponent(val)}`);
                    if (r.ok) {
                        const data = await r.json();
                        renderSearchOverlay(data);
                    }
                } catch(e) {
                    console.error("Search query failed", e);
                }
            }
        });

        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            clearSearchBtn.style.display = 'none';
            hideSearch();
        });

        function hideSearch() {
            document.getElementById('search-overlay').style.display = 'none';
        }

        // Action: Authorize Work Order
        async function authorizeWorkOrder() {
            if (!rec || !rec.has_recommendation) return;
            const btn = document.getElementById('btn-wo-authorize');
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Scheduling...';
            }
            try {
                const r = await fetch(`${API_BASE}/work-orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        machine_id: activeId,
                        priority: rec.priority,
                        action_required: rec.recommendation
                    })
                });
                if (r.ok) {
                    alert("Mitigation authorized successfully! Telemetry returning to normal.");
                    // Refresh data
                    loadMachines();
                    loadDetails(activeId);
                    loadRecommendations(activeId);
                    fetchAnalytics();
                }
            } catch(e) {
                console.error("WO generate failure", e);
                alert("Failed to authorize order.");
            }
        }

        // ----------------- RENDER METHODS -----------------
        
        function renderMachineList() {
            const container = document.getElementById('machine-list-container');
            container.innerHTML = '';
            
            machines.forEach(m => {
                const riskLevel = m.status === 'Critical' ? 'danger' : m.status === 'Warning' ? 'warning' : 'healthy';
                const isActive = m.machine_id === activeId;
                
                const item = document.createElement('div');
                item.className = `machine-item ${isActive ? 'active' : ''}`;
                item.id = `m-item-${m.machine_id}`;
                item.onclick = () => selectMachine(m.machine_id);
                
                item.innerHTML = `
                    <div class="machine-item-top">
                        <div class="machine-name-group">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${riskLevel === 'danger' ? '#f43f5e' : riskLevel === 'warning' ? '#f59e0b' : '#10b981'}" stroke-width="2.5">
                                <circle cx="12" cy="12" r="10" />
                                <circle cx="12" cy="12" r="4" />
                            </svg>
                            <span>${m.machine_name}</span>
                        </div>
                        <span class="machine-prob-badge ${riskLevel}">${m.status}</span>
                    </div>
                    <div class="machine-metrics-row">
                        <span>T: ${m.temperature.toFixed(1)}°C</span>
                        <span>P: ${m.pressure.toFixed(0)} PSI</span>
                        <span>V: ${m.vibration.toFixed(1)}m/s²</span>
                        <span>RPM: ${m.rpm}</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function renderGauge() {
            const prob = detail && detail.prediction ? detail.prediction.failure_probability : 5;
            const label = detail && detail.prediction ? detail.prediction.predicted_failure : 'Normal Operation';
            const timeVal = detail && detail.prediction ? detail.prediction.time_to_failure : 'N/A';
            
            const strokeDash = (prob / 100.0) * 376.8; // 2 * pi * 60 = 376.8
            
            const fill = document.getElementById('gauge-fill');
            const valText = document.getElementById('gauge-val-text');
            const typeText = document.getElementById('gauge-failure-type');
            const timeText = document.getElementById('gauge-time-remaining');
            
            fill.setAttribute('stroke-dasharray', `${strokeDash} 376.8`);
            fill.className = `gauge-fill ${prob >= 70 ? 'danger' : prob >= 30 ? 'warning' : 'healthy'}`;
            
            valText.textContent = `${prob.toFixed(0)}%`;
            valText.style.color = prob >= 70 ? 'var(--danger)' : prob >= 30 ? 'var(--warning)' : 'var(--success)';
            
            typeText.textContent = label;
            
            if (timeVal && timeVal !== 'N/A') {
                timeText.style.display = 'block';
                timeText.innerHTML = `
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" style="display:inline; margin-right:2px; vertical-align:middle;">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg> Est. failure: <strong>${timeVal}</strong>
                `;
            } else {
                timeText.style.display = 'none';
            }
        }

        function renderChart() {
            const container = document.getElementById('chart-svg-container');
            container.innerHTML = '';
            
            if (!detail || !detail.sensor_history || detail.sensor_history.length === 0) {
                container.innerHTML = '<div style="display:flex; justify-content:center; align-items:center; height:100%; font-size:11px; color:var(--text-muted);">No sensor data logged.</div>';
                return;
            }

            const width = 450;
            const height = 150;
            const padding = 20;

            const values = detail.sensor_history.map(h => h[activeTab]);
            const maxVal = Math.max(...values, 1) * 1.05;
            const minVal = Math.min(...values, 0) * 0.95;
            const valRange = maxVal - minVal || 1;

            const points = detail.sensor_history.map((h, i) => {
                const x = padding + (i * (width - padding * 2)) / (detail.sensor_history.length - 1);
                const val = h[activeTab];
                const y = height - padding - ((val - minVal) * (height - padding * 2)) / valRange;
                return { x, y };
            });

            let path = `M ${points[0].x} ${points[0].y}`;
            for (let i = 1; i < points.length; i++) {
                path += ` L ${points[i].x} ${points[i].y}`;
            }

            const area = `${path} L ${points[points.length - 1].x} ${height - padding} L ${points[0].x} ${height - padding} Z`;
            
            // Build elements using SVG DOM
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('style', 'width:100%; height:100%;');
            
            // Gradients
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
            grad.setAttribute('id', 'chart-gradient-local');
            grad.setAttribute('x1', '0');
            grad.setAttribute('y1', '0');
            grad.setAttribute('x2', '0');
            grad.setAttribute('y2', '1');
            
            const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop1.setAttribute('offset', '0%');
            stop1.setAttribute('stop-color', 'var(--primary)');
            stop1.setAttribute('stop-opacity', '0.25');
            const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop2.setAttribute('offset', '100%');
            stop2.setAttribute('stop-color', 'var(--primary)');
            stop2.setAttribute('stop-opacity', '0');
            
            grad.appendChild(stop1);
            grad.appendChild(stop2);
            defs.appendChild(grad);
            svg.appendChild(defs);

            // Grids
            [30, 60, 90, 120].forEach(y => {
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', '20');
                line.setAttribute('y1', String(y));
                line.setAttribute('x2', String(width - 20));
                line.setAttribute('y2', String(y));
                line.setAttribute('stroke', 'rgba(255,255,255,0.03)');
                svg.appendChild(line);
            });

            // Path Area
            const areaPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            areaPath.setAttribute('d', area);
            areaPath.setAttribute('fill', 'url(#chart-gradient-local)');
            svg.appendChild(areaPath);

            // Stroke Path
            const strokePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            strokePath.setAttribute('d', path);
            strokePath.setAttribute('fill', 'none');
            strokePath.setAttribute('stroke', 'var(--primary)');
            strokePath.setAttribute('stroke-width', '2.5');
            strokePath.setAttribute('stroke-linecap', 'round');
            strokePath.setAttribute('stroke-linejoin', 'round');
            svg.appendChild(strokePath);

            // Dots
            points.forEach((p, i) => {
                const val = detail.sensor_history[i][activeTab];
                const isAnomaly = activeTab === 'vibration' && val > 5;
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', String(p.x));
                circle.setAttribute('cy', String(p.y));
                circle.setAttribute('r', isAnomaly ? '5' : '3.5');
                circle.setAttribute('fill', isAnomaly ? 'var(--danger)' : 'var(--primary)');
                circle.setAttribute('stroke', '#070a13');
                circle.setAttribute('stroke-width', '1.5');
                circle.setAttribute('style', 'cursor:pointer');
                
                const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                title.textContent = `Value: ${val.toFixed(1)}`;
                circle.appendChild(title);
                svg.appendChild(circle);
            });

            // Axis labels
            const xText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            xText.setAttribute('x', '20');
            xText.setAttribute('y', String(height - 4));
            xText.setAttribute('fill', 'var(--text-muted)');
            xText.setAttribute('font-size', '9');
            xText.textContent = 'Time →';
            svg.appendChild(xText);

            const yText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            yText.setAttribute('x', String(width - 20));
            yText.setAttribute('y', '15');
            yText.setAttribute('fill', 'var(--text-muted)');
            yText.setAttribute('font-size', '9');
            yText.setAttribute('text-anchor', 'end');
            yText.textContent = `Max: ${maxVal.toFixed(1)}`;
            svg.appendChild(yText);

            container.appendChild(svg);
        }

        function renderRecommendations() {
            const container = document.getElementById('recommendations-container');
            container.innerHTML = '';
            
            if (!rec || !rec.has_recommendation) {
                container.innerHTML = `
                    <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding: 20px 0;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" style="margin-bottom:8px;">
                            <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
                            <polyline points="22 4 12 14.01 9 11.01" />
                        </svg>
                        <h3 style="font-size:14px; font-weight:700;">Vitals Stable & Normal</h3>
                        <p style="font-size:11px; color:var(--text-muted); margin-top:2px;">No active remediation procedures are required at this time.</p>
                    </div>
                `;
                return;
            }

            let partsHtml = '';
            if (rec.parts_status.length === 0) {
                partsHtml = '<p style="font-size:11px; color:var(--text-secondary); margin-top:5px;">No parts are needed for this operation.</p>';
            } else {
                partsHtml = `
                    <table class="parts-table" style="margin-top:6px;">
                        <thead>
                            <tr>
                                <th>Part Name</th>
                                <th>Needed</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th style="text-align:right">Cost</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rec.parts_status.map(p => `
                                <tr>
                                    <td>${p.part_name}</td>
                                    <td>${p.quantity_required}</td>
                                    <td>${p.stock_available}</td>
                                    <td>
                                        <span class="part-badge ${p.status}">${p.status}</span>
                                    </td>
                                    <td style="text-align:right; color:var(--text-secondary)">$${p.unit_cost.toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            container.innerHTML = `
                <div class="rec-title-row">
                    <div>
                        <h3 style="font-size:16px; font-weight:700; display:flex; align-items:center; gap:6px; font-family:var(--font-heading)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5">
                                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
                            </svg> Prescriptive Mitigation Action Plan
                        </h3>
                        <p style="font-size:9px; color:var(--text-muted); margin-top:2px;">Generated: ${new Date(rec.created_at).toLocaleString()}</p>
                    </div>
                    <span class="rec-priority-badge ${rec.priority.toLowerCase()}">${rec.priority} Priority (Conf: ${rec.confidence}%)</span>
                </div>
                <div class="rec-action-box">
                    <span style="font-size:9px; font-weight:700; color:var(--text-muted); text-transform:uppercase; tracking-wider;">Remediation Steps</span>
                    <p style="font-size:12px; margin-top:4px; line-height:1.5;">${rec.recommendation}</p>
                </div>
                <div>
                    <span style="font-size:9px; font-weight:700; color:var(--text-muted); text-transform:uppercase; tracking-wider;">Required Spare Parts Checklist</span>
                    ${partsHtml}
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border-glass); padding-top:14px; margin-top:6px;">
                    <span style="font-size:11px; color:var(--text-secondary);">
                        Est. Repair Duration: <strong>${rec.estimated_duration_hours} hrs</strong>
                    </span>
                    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
                        ${rec.parts_missing ? `<span style="font-size:10px; color:var(--danger); font-weight:600; display:flex; align-items:center; gap:2px;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg> Parts short stock warning</span>` : ''}
                        <button class="btn-action" id="btn-wo-authorize" onclick="authorizeWorkOrder()">
                            Authorize Corrective Work Order
                        </button>
                    </div>
                </div>
            `;
        }

        function renderAlerts() {
            const container = document.getElementById('alerts-container');
            container.innerHTML = '';
            
            if (alerts.length === 0) {
                container.innerHTML = '<p style="font-size:11px; color:var(--text-muted); text-align:center; margin-top:20px;">No alerts logged.</p>';
                return;
            }

            alerts.forEach(a => {
                const isCrit = a.severity && a.severity.toLowerCase() === 'critical';
                const isHigh = a.severity && a.severity.toLowerCase() === 'high';
                const cls = isCrit ? 'critical' : isHigh ? 'warning' : 'info';
                
                const card = document.createElement('div');
                card.className = `alert-card ${cls}`;
                card.innerHTML = `
                    <div style="display:flex; gap:6px; align-items:center; font-weight:700;">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="${isCrit ? 'var(--danger)' : isHigh ? 'var(--warning)' : 'var(--info)'}" stroke-width="3">
                            <circle cx="12" cy="12" r="10" />
                        </svg>
                        <span class="alert-subject" style="color:${isCrit ? 'var(--danger)' : isHigh ? 'var(--warning)' : '#f8fafc'}">${a.severity} Risk: Machine-${a.machine_id}</span>
                    </div>
                    <p class="alert-message">${a.message}</p>
                    <span class="alert-time">${new Date(a.created_at).toLocaleTimeString()}</span>
                `;
                container.appendChild(card);
            });
        }

        function renderSearchOverlay(data) {
            const overlay = document.getElementById('search-overlay');
            const container = document.getElementById('search-results-container');
            
            container.innerHTML = '';
            overlay.style.display = 'block';

            if (data.docs.length === 0) {
                container.innerHTML = '<p style="font-size:11px; color:var(--text-muted);">No historical log incidents match this search term.</p>';
                return;
            }

            data.docs.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-weight:700; color:var(--primary); font-size: 12px;">
                        <strong>Machine-${doc.machine_id}</strong>
                        <span style="color:var(--text-muted)">${new Date(doc.date).toLocaleDateString()}</span>
                    </div>
                    <p style="margin-top:2px;"><span style="color:var(--danger)">Signature:</span> ${doc.failure_signature}</p>
                    <p><span style="color:var(--success)">Correction:</span> ${doc.action_taken}</p>
                    <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">
                        Outcome: <span style="color:var(--success); font-weight:600">${doc.outcome}</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Initialize App
        async function init() {
            await fetchHealth();
            await loadMachines();
            await loadAlerts();
            await fetchAnalytics();
            
            if (machines.length > 0) {
                const exists = machines.some(m => m.machine_id === activeId);
                selectMachine(exists ? activeId : machines[0].machine_id);
            }
        }
        
        init();

        // Setup live vitals loop polling
        setInterval(async () => {
            await loadMachines();
            await loadAlerts();
            await fetchAnalytics();
            if (activeId) {
                await loadDetails(activeId);
            }
        }, 3000);
    </script>
</body>
</html>
