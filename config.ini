[database]
host = localhost
port = 5432
database = predictive_maintenance
user = postgres
password = postgres
pool_size = 10
max_overflow = 20

[aws]
region = us-east-1
sqs_queue_url = https://sqs.us-east-1.amazonaws.com/123456789/sensor-data-queue
rds_endpoint = predictive-maintenance.c9akciq32.us-east-1.rds.amazonaws.com
s3_bucket = industrial-ai-bucket

[ml_model]
model_type = gradient_boosting
model_version = 1.0
threshold_probability = 0.5
confidence_threshold = 0.7

[sensors]
update_frequency_seconds = 60
batch_size = 1000
retention_days = 90

[alerts]
email_enabled = false
slack_enabled = false
high_risk_alert_threshold = 0.75
critical_alert_threshold = 0.9

[monitoring]
log_level = INFO
metrics_enabled = true
performance_tracking = true

[recommendations]
max_recommendations_per_machine = 5
cost_optimization = true
schedule_maintenance_days_ahead = 7
